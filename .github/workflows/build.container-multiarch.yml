name: _reusable · Container build (multi-arch, native, no QEMU)

# Multi-arch sibling of container-build. Builds each platform on a
# NATIVE runner (amd64 on ubuntu-24.04, arm64 on ubuntu-24.04-arm) — NEVER
# setup-qemu — pushes each by digest, then a merge job assembles the
# manifest list under image:tag. Standard buildx "distribute across runners"
# pattern. Registry: GHCR (GITHUB_TOKEN) or ECR (OIDC + `registry` secret).
# Consumed cross-repo as
# uses: githumps/infra-public/.github/workflows/build.container-multiarch.yml@<sha>
# All actions SHA-pinned.
# CALLER MUST GRANT these permissions (a reusable that declares a permission
# the caller hasn't granted fails at STARTUP):
#   permissions: { contents: read, packages: write, id-token: write }
# (packages:write for GHCR push; id-token:write for the ECR-OIDC path —
#  grant both even for GHCR-only callers, since the reusable declares them.)

on:
  workflow_call:
    inputs:
      image:
        description: "Image repo path WITHOUT tag. Full ref (ghcr.io/owner/repo) or repo-path when the `registry` secret (ECR host) is set."
        required: true
        type: string
      tag:
        description: "Tag for the final manifest list."
        required: true
        type: string
      context:
        required: false
        type: string
        default: "."
      dockerfile:
        required: false
        type: string
        default: "Dockerfile"
      push:
        description: "Push + assemble the manifest. false = per-arch build-only (PR validation)."
        required: false
        type: boolean
        default: true
      registry-type:
        description: "ghcr | ecr | none"
        required: false
        type: string
        default: "ghcr"
      aws-region:
        required: false
        type: string
        default: "us-east-1"
      build-args:
        required: false
        type: string
        default: ""
      target:
        description: "Optional Dockerfile build stage (multi-stage builds). Empty = final stage."
        required: false
        type: string
        default: ""
      amd64-runner:
        description: "Runner label(s) for the native amd64 build. Default GitHub-hosted; override for a self-hosted/ARC amd64 pool."
        required: false
        type: string
        default: "ubuntu-24.04"
      arm64-runner:
        description: "Runner label(s) for the native arm64 build. Default GitHub-hosted arm64; override for a self-hosted/ARC arm64 pool."
        required: false
        type: string
        default: "ubuntu-24.04-arm"
    secrets:
      role_to_assume:
        description: "IAM role ARN for ECR push via OIDC (registry-type=ecr)."
        required: false
      registry:
        description: "ECR host to prepend to `image` (embeds the account id; passed as secret). Omit for GHCR/full refs."
        required: false
    outputs:
      digest:
        description: "Manifest-list digest (sha256:...); empty when push=false."
        value: ${{ jobs.merge.outputs.digest }}

permissions:
  id-token: write   # ECR OIDC
  contents: read
  packages: write   # GHCR push

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: linux/amd64, runner: "${{ inputs.amd64-runner }}", arch: amd64, host: x86_64 }
          - { platform: linux/arm64, runner: "${{ inputs.arm64-runner }}", arch: arm64, host: aarch64 }
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # Don't persist GITHUB_TOKEN in .git/config — the build/push uses the
          # registry credential, never git-over-HTTPS to the caller repo (#10).
          persist-credentials: false
      - name: "Guard: native CPU (no QEMU)"
        env: { WANT: "${{ matrix.host }}" }
        run: |
          set -euo pipefail
          h="$(uname -m)"; [ "$h" = "$WANT" ] || { echo "::error::${{ matrix.platform }} wants $WANT but runner is $h (this reusable never uses QEMU)"; exit 1; }
          echo "✓ native ${{ matrix.platform }} on $h"
      - name: "Compose image ref"
        id: ref
        env: { IMAGE: "${{ inputs.image }}", REGISTRY: "${{ secrets.registry }}" }
        run: |
          set -euo pipefail
          if [ -n "$REGISTRY" ] && [ "${IMAGE#"$REGISTRY"/}" = "$IMAGE" ]; then ref="$REGISTRY/$IMAGE"; else ref="$IMAGE"; fi
          echo "image=$ref" >> "$GITHUB_OUTPUT"
      - name: "GHCR login"
        if: ${{ inputs.push && inputs.registry-type == 'ghcr' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: "ECR auth (OIDC)"
        if: ${{ inputs.push && inputs.registry-type == 'ecr' }}
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with: { role-to-assume: "${{ secrets.role_to_assume }}", aws-region: "${{ inputs.aws-region }}" }
      - name: "ECR login"
        if: ${{ inputs.push && inputs.registry-type == 'ecr' }}
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076  # v2
      - name: "Set up Docker Buildx (NO setup-qemu)"
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
      - name: "Build + push by digest (native ${{ matrix.arch }})"
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          target: ${{ inputs.target }}
          platforms: ${{ matrix.platform }}
          build-args: ${{ inputs.build-args }}
          provenance: false
          outputs: type=image,name=${{ steps.ref.outputs.image }},push-by-digest=true,name-canonical=true,push=${{ inputs.push }}
      - name: "Export digest"
        if: ${{ inputs.push }}
        env: { DIGEST: "${{ steps.build.outputs.digest }}" }
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - name: "Upload digest"
        if: ${{ inputs.push }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with: { name: "digests-${{ matrix.arch }}", path: /tmp/digests/*, retention-days: 1, if-no-files-found: error }

  merge:
    needs: build
    if: ${{ inputs.push }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      digest: ${{ steps.merge.outputs.digest }}
    steps:
      - name: "Compose image ref"
        id: ref
        env: { IMAGE: "${{ inputs.image }}", REGISTRY: "${{ secrets.registry }}" }
        run: |
          set -euo pipefail
          if [ -n "$REGISTRY" ] && [ "${IMAGE#"$REGISTRY"/}" = "$IMAGE" ]; then ref="$REGISTRY/$IMAGE"; else ref="$IMAGE"; fi
          echo "image=$ref" >> "$GITHUB_OUTPUT"
      - name: "GHCR login"
        if: ${{ inputs.registry-type == 'ghcr' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - name: "ECR auth (OIDC)"
        if: ${{ inputs.registry-type == 'ecr' }}
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with: { role-to-assume: "${{ secrets.role_to_assume }}", aws-region: "${{ inputs.aws-region }}" }
      - name: "ECR login"
        if: ${{ inputs.registry-type == 'ecr' }}
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076  # v2
      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
      - name: "Download per-arch digests"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with: { path: /tmp/digests, pattern: digests-*, merge-multiple: true }
      - name: "Create + push manifest list"
        id: merge
        working-directory: /tmp/digests
        env: { IMAGE_REF: "${{ steps.ref.outputs.image }}", TAG: "${{ inputs.tag }}" }
        run: |
          set -euo pipefail
          # shellcheck disable=SC2046
          refs=""
          for d in *; do refs="$refs ${IMAGE_REF}@sha256:${d}"; done
          docker buildx imagetools create -t "${IMAGE_REF}:${TAG}" $refs
          digest=$(docker buildx imagetools inspect "${IMAGE_REF}:${TAG}" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "✓ pushed manifest ${IMAGE_REF}:${TAG} (${digest})"
