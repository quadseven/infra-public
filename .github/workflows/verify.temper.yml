name: _reusable · temper verify (spec cascade)

# Reusable temper spec-verification. Collapses the near-identical
# spec-cascade check that consuming repos carry into one definition:
# locate-or-build the temper binary (baked at /opt/temper/<sha>/temper on
# warm self-hosted runners, else clone + `cargo build --release` cold-path),
# then run `temper verify -s <dir>/` over every spec directory.
#
# Caller passes the pinned `temper-repo-sha` (the binary version) + its
# `runner`. Consumed cross-repo as
# `uses: githumps/infra-public/.github/workflows/verify.temper.yml@<sha>`.
# All actions SHA-pinned.

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner label/pool. Self-hosted runners with a baked /opt/temper/<sha> skip the cold build."
        required: false
        type: string
        default: "ubuntu-latest"
      temper-repo:
        description: "owner/repo of the temper source (cold-build path)."
        required: false
        type: string
        default: "nerdsane/temper"
      temper-repo-sha:
        description: "Pinned temper commit SHA — selects the baked binary and the cold-build checkout."
        required: true
        type: string
      specs-dir:
        description: "Directory whose immediate subdirectories are each `temper verify`-d."
        required: false
        type: string
        default: "specs"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ${{ inputs.runner }}
    # 40min, not 25 (#9): the cold path (GH-hosted, no baked binary) must
    # apt-install libz3-dev/libclang-dev, clone temper, and `cargo build
    # --release` — a from-scratch arm64 Rust build can exceed 25min and time out.
    # The warm path (baked binary present) still finishes in seconds.
    timeout-minutes: 40
    env:
      # Passed via env (not ${{ }} in run:) so caller inputs can't inject shell.
      TEMPER_REPO: ${{ inputs.temper-repo }}
      TEMPER_REPO_SHA: ${{ inputs.temper-repo-sha }}
      SPECS_DIR: ${{ inputs.specs-dir }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: "Locate or build temper binary"
        id: temper
        run: |
          set -euo pipefail
          # Validate the SHA is hex (it's interpolated into a path + git checkout).
          case "$TEMPER_REPO_SHA" in
            *[!a-f0-9]*|"") echo "::error::temper-repo-sha must be a hex commit SHA"; exit 1 ;;
          esac
          BAKED="/opt/temper/${TEMPER_REPO_SHA}/temper"
          if [ -x "$BAKED" ]; then
            echo "Using pre-built temper at $BAKED"
            echo "binary=$BAKED" >> "$GITHUB_OUTPUT"
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "No pre-built temper found; will build from source"
            echo "binary=/tmp/temper/target/release/temper" >> "$GITHUB_OUTPUT"
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "Install Rust toolchain (cold-path only)"
        if: steps.temper.outputs.needs_build == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable @ 2026-06
        with:
          toolchain: stable

      - name: "Install temper build deps (cold-path only)"
        if: steps.temper.outputs.needs_build == 'true'
        run: |
          set -euo pipefail
          missing=()
          pkg-config --exists openssl || missing+=("libssl-dev" "pkg-config")
          dpkg -s libz3-dev >/dev/null 2>&1 || missing+=("libz3-dev")
          dpkg -s libclang-dev >/dev/null 2>&1 || missing+=("libclang-dev")
          if (( ${#missing[@]} > 0 )); then
            sudo apt-get update -qq
            sudo apt-get install -y -qq "${missing[@]}"
          fi

      - name: "Clone + build temper (cold-path only)"
        if: steps.temper.outputs.needs_build == 'true'
        run: |
          set -euo pipefail
          rm -rf /tmp/temper
          # Blobless partial clone (#14): fetch commits + trees but NOT historical
          # blobs; `git checkout <sha>` then lazily fetches only the blobs for that
          # one commit's tree. We compile a single pinned SHA, so downloading the
          # whole repo's blob history is pure waste on the cold path. Still works
          # for an arbitrary SHA (all refs/commits are present).
          git clone --filter=blob:none "https://github.com/${TEMPER_REPO}.git" /tmp/temper
          cd /tmp/temper
          git checkout "$TEMPER_REPO_SHA"
          cargo build --release --locked --bin temper

      - name: "Verify all spec directories"
        env:
          BINARY: ${{ steps.temper.outputs.binary }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          found=0
          for d in "$SPECS_DIR"/*/; do
            found=1
            echo "::group::temper verify $d"
            "$BINARY" verify -s "$d"
            echo "::endgroup::"
          done
          if [ "$found" -ne 1 ]; then
            echo "::error::no spec directories found under '$SPECS_DIR/'"
            exit 1
          fi
