name: Reusable · Deploy to GitHub Pages

# Shared GitHub Pages publish. Replaces the inline
# configure-pages -> upload-pages-artifact -> deploy-pages trio duplicated
# across static-site repos. The CALLER
# grants the Pages permissions (a reusable can't elevate beyond the caller's
# GITHUB_TOKEN); this workflow runs the standard publish on a native runner.
# All actions SHA-pinned per the infra-public standard.

on:
  workflow_call:
    inputs:
      artifact_path:
        description: "Directory to publish as the Pages artifact (default: repo root)."
        type: string
        required: false
        default: "."
      runs_on:
        description: "Runner label."
        type: string
        required: false
        default: "ubuntu-latest"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ${{ inputs.runs_on }}
    # GitHub's default job timeout is 360 min (6h). Pages publishes take <2 min;
    # cap here because callers use a `uses:` job and can't set timeout-minutes.
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # Pages publishes via the OIDC/id-token flow (configure/upload/deploy-pages),
          # never git-over-HTTPS — so don't persist GITHUB_TOKEN in .git/config (#12).
          persist-credentials: false
      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5
      - name: Upload static site
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: ${{ inputs.artifact_path }}
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5
