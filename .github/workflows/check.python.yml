name: _reusable · Python check (ruff + pytest)

# Reusable Python lint/test. Encodes the ruff + uv + pytest conventions
# once so consuming repos' validate jobs stop copy-pasting them (a tool
# pin or rule change then lands in one place).
#
# Flow: checkout -> setup-uv -> install (uv sync) -> ruff check + ruff
# format --check (toggle) -> test-cmd (skip if empty). uv manages the
# Python toolchain (no setup-python); set `python-version` to override
# via UV_PYTHON. Set `ruff-version` to pin ruff exactly (via `uvx
# ruff@<version>`) from the single-source RUFF_VERSION constant so
# local pre-commit and CI lint with the identical ruff build.
#
# Caller picks `runner` to match its tier: a GitHub-hosted runner
# (ubuntu-latest) for public repos, or a self-hosted/ARC pool otherwise.
# Consumed cross-repo as
# `uses: quadseven/infra-public/.github/workflows/check.python.yml@<sha>`.
# All actions SHA-pinned.

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner label/pool (caller picks per tier policy). e.g. ubuntu-latest (public) or an ARC pool."
        required: false
        type: string
        default: "ubuntu-latest"
      working-directory:
        description: "Directory to run install/lint/test in (the Python project root)."
        required: false
        type: string
        default: "."
      python-version:
        description: "Optional Python version override (sets UV_PYTHON). Empty = use the project's .python-version / pyproject."
        required: false
        type: string
        default: ""
      install-cmd:
        description: "Dependency install command. Run as a shell command (caller-controlled by design) — do NOT forward untrusted data (PR titles, etc.) into it."
        required: false
        type: string
        default: "uv sync --frozen"
      ruff:
        description: "Run `ruff check` + `ruff format --check`."
        required: false
        type: boolean
        default: true
      ruff-version:
        description: "Pin ruff to an exact version via `uvx ruff@<version>` (single source of truth - set from the canonical RUFF_VERSION constant). Empty = ruff resolved by the project (legacy: `uv run ruff` / `ruff`). When set, overrides `use-uv-run` for the ruff step (uvx fetches the pinned tool regardless of project deps)."
        required: false
        type: string
        default: ""
      use-uv-run:
        description: "Prefix ruff with `uv run` (true, for uv-project repos) vs call `ruff` directly (false, for repos that install tools onto the system via `uv pip install --system` / requirements files)."
        required: false
        type: boolean
        default: true
      lint-paths:
        description: "Path(s) ruff lints/format-checks, relative to working-directory. Default '.' (whole tree). Set e.g. 'services/' to scope linting to a subdir while deps install at the project root."
        required: false
        type: string
        default: "."
      test-cmd:
        description: "Test command. Empty string skips the test step (lint-only callers). Run as a shell command (caller-controlled by design) — do NOT forward untrusted data into it."
        required: false
        type: string
        default: "uv run pytest -q"
      timeout-minutes:
        description: "Job timeout."
        required: false
        type: number
        default: 15

permissions:
  contents: read

jobs:
  check:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    env:
      UV_PYTHON: ${{ inputs.python-version }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        # Don't leave GITHUB_TOKEN in .git/config: this job then runs
        # caller-controlled install-cmd / test-cmd (pytest), which would
        # otherwise be able to read the persisted token. Lint/test need no git auth.
        with:
          persist-credentials: false
      # Pin the interpreter for system-install repos (use-uv-run:false): their
      # `uv pip install --system` targets the active Python, so without this the
      # runner's default version is used (e.g. ubuntu-latest's 3.12) instead of
      # the pinned one. uv-run repos skip this — uv resolves Python via UV_PYTHON.
      - name: "Set up Python"
        if: ${{ !inputs.use-uv-run && inputs.python-version != '' }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}
      - name: "Set up uv"
        # Step-level bound so a stalled provider/cache fetch fails fast and
        # clearly here, rather than only being caught by the job timeout
        # (grug-rule:subprocess-no-timeout). 5 min is far above the normal
        # few-seconds install + cache restore.
        timeout-minutes: 5
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          # Cache uv's download/wheel store across runs, keyed on the caller's
          # dependency files under working-directory. Pure speedup: uv still
          # resolves authoritatively from the lockfile/pyproject, so a cache
          # hit only avoids re-downloading wheels - it can never change which
          # deps install. Cost-neutral (GitHub Actions cache); busts the key on
          # any dependency-file change so it can't go stale.
          enable-cache: true
          cache-dependency-glob: |
            ${{ inputs.working-directory }}/**/uv.lock
            ${{ inputs.working-directory }}/**/requirements*.txt
            ${{ inputs.working-directory }}/**/pyproject.toml
      - name: "Install dependencies"
        run: ${{ inputs.install-cmd }}
      - name: "Ruff check + format --check"
        if: ${{ inputs.ruff }}
        env:
          # Pass via env (not direct ${{ }} in the command line) so the value
          # can't inject a `${{ }}`-expanded shell command. Then validate it's
          # path-shaped before word-splitting it into ruff args.
          LINT_PATHS: ${{ inputs.lint-paths }}
          # Resolve the ruff invocation by precedence:
          #   ruff-version set -> `uvx ruff@<version>` (exact pin from the
          #     single-source RUFF_VERSION; overrides use-uv-run since uvx
          #     fetches the tool itself, project deps irrelevant).
          #   else use-uv-run  -> `uv run ruff` (uv-project repos).
          #   else             -> `ruff` (system-installed repos).
          RUFF_VERSION: ${{ inputs.ruff-version }}
          RUFF: ${{ inputs.ruff-version != '' && format('uvx ruff@{0}', inputs.ruff-version) || (inputs.use-uv-run && 'uv run ruff' || 'ruff') }}
        run: |
          set -euo pipefail
          # Validate the version is semver-shaped before it reaches `uvx ruff@..`,
          # so a malformed input fails loud rather than letting uvx mis-resolve.
          if [ -n "$RUFF_VERSION" ]; then
            case "$RUFF_VERSION" in
              *[!0-9.]*)
                echo "::error::ruff-version must be a dotted numeric version (e.g. 0.15.10); got: $RUFF_VERSION"
                exit 1 ;;
            esac
          fi
          case "$LINT_PATHS" in
            *[!A-Za-z0-9_./\ -]*)
              echo "::error::lint-paths must be path-shaped ([A-Za-z0-9_./ -]); got: $LINT_PATHS"
              exit 1 ;;
          esac
          # Intentional word-split: $RUFF is a fixed 'uvx ruff@x'|'uv run ruff'|'ruff' prefix
          # and $LINT_PATHS is validated path-shaped above — both safe to split.
          # shellcheck disable=SC2086
          $RUFF check $LINT_PATHS
          # shellcheck disable=SC2086
          $RUFF format --check $LINT_PATHS
      - name: "Test"
        if: ${{ inputs.test-cmd != '' }}
        run: ${{ inputs.test-cmd }}
