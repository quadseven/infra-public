name: _reusable · Container build (native CPU, no QEMU)

# Reusable native-CPU container build.
#
# HEADLINE STANDARD: never `setup-qemu`. Build on a runner whose CPU
# matches the target arch so arm64 images build on real arm64 silicon
# (no emulation tax). The caller picks `runner` to match the target arch:
#   public  arm64 -> ubuntu-24.04-arm   (GitHub-hosted, native, free)
#   private arm64 -> a native arm64 ARC pool
#   amd64         -> ubuntu-24.04 / an amd64 pool
#
# A pre-build guard asserts the host arch matches `platform` and fails
# fast if a caller misroutes to a foreign-arch runner (which would either
# silently fall back to QEMU or fail deep in the build) — this also makes
# native placement verifiable in the log.
#
# buildx single-arch build + push, emits the immutable sha256 digest as
# the `digest` output so callers can deploy by digest (not tag). ECR push
# (OIDC) or no-push (CI). For multi-arch, see the multiarch sibling.
#
# All actions SHA-pinned. Consumed cross-repo as
# `uses: githumps/infra-public/.github/workflows/build.container.yml@<sha>`.

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner label/pool. Caller picks per the tier policy (native CPU for the target arch)."
        required: true
        type: string
      environment:
        description: |
          Optional GitHub deployment environment for the build job. Set this when the
          ECR role's OIDC trust is scoped to an environment subject
          (sub=repo:OWNER/REPO:environment:NAME) rather than a branch ref. A `uses:`
          (reusable-call) job in the CALLER cannot set `environment`, so the subject is
          fixed here instead. Default "" = no environment (subject is the branch ref,
          the common case).
        required: false
        type: string
        default: ""
      image:
        description: "Image repo path WITHOUT tag. Either a full ref (ghcr.io/owner/repo) or, when the `registry` secret is set, just the repo path (e.g. my-service) — the secret is prepended. Required when push=true."
        required: false
        type: string
        default: ""
      tag:
        description: "Image tag to push."
        required: false
        type: string
        default: ""
      context:
        description: "Docker build context path."
        required: false
        type: string
        default: "."
      dockerfile:
        description: "Path to the Dockerfile."
        required: false
        type: string
        default: "Dockerfile"
      platform:
        description: "Single target platform, e.g. linux/arm64 or linux/amd64."
        required: false
        type: string
        default: "linux/arm64"
      push:
        description: "Push to the registry. false = build-only (CI canary / PR validation)."
        required: false
        type: boolean
        default: true
      registry-type:
        description: "Registry auth method: 'ecr' (OIDC) or 'none' (build-only). 'ghcr' is a follow-up."
        required: false
        type: string
        default: "ecr"
      aws-region:
        description: "AWS region for ECR."
        required: false
        type: string
        default: "us-east-1"
      build-args:
        description: "Multiline KEY=VALUE build args passed to buildx."
        required: false
        type: string
        default: ""
    secrets:
      role_to_assume:
        description: "IAM role ARN for ECR push via GitHub OIDC (required when registry-type=ecr and push=true). Underscored: reusable-workflow secret names can't contain hyphens."
        required: false
      registry:
        description: |
          Registry host to PREPEND to `image`, e.g. <acct>.dkr.ecr.us-east-1.amazonaws.com.
          Passed as a secret because the ECR host embeds the AWS account id, which
          callers store as a secret (and secrets can't be referenced in a reusable's
          `with:` inputs). Optional — omit when `image` is already a full ref (ghcr.io/...).
        required: false
    outputs:
      digest:
        description: "Immutable image digest (sha256:...) of the pushed image; empty when push=false."
        value: ${{ jobs.build.outputs.digest }}

permissions:
  id-token: write   # ECR OIDC
  contents: read

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    # Empty string = no environment (subject is the branch ref). Set by callers
    # whose ECR role trust is scoped to an environment subject (e.g. aws-prod).
    environment: ${{ inputs.environment }}
    timeout-minutes: 30
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: "Guard: native CPU match (no QEMU)"
        env:
          WANT: ${{ inputs.platform }}
        run: |
          set -euo pipefail
          host="$(uname -m)"   # aarch64 (arm64) | x86_64 (amd64)
          case "$WANT" in
            *arm64*) [ "$host" = "aarch64" ] || { echo "::error::platform=$WANT but runner CPU is $host — route to a native arm64 runner (this reusable never uses QEMU)."; exit 1; } ;;
            *amd64*) [ "$host" = "x86_64" ]  || { echo "::error::platform=$WANT but runner CPU is $host — route to a native amd64 runner (this reusable never uses QEMU)."; exit 1; } ;;
            *) echo "::error::unsupported platform '$WANT' (single-arch linux/arm64 or linux/amd64)"; exit 1 ;;
          esac
          echo "✓ native build: platform=$WANT on $host runner"

      - name: "Authenticate to AWS for ECR (OIDC)"
        if: ${{ inputs.push && inputs.registry-type == 'ecr' }}
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.role_to_assume }}
          aws-region: ${{ inputs.aws-region }}

      - name: "Log in to Amazon ECR"
        if: ${{ inputs.push && inputs.registry-type == 'ecr' }}
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076  # v2

      - name: "Set up Docker Buildx (NO setup-qemu)"
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: "Compose image ref (prepend registry secret if set)"
        id: ref
        if: ${{ inputs.push }}
        env:
          IMAGE: ${{ inputs.image }}
          TAG: ${{ inputs.tag }}
          REGISTRY: ${{ secrets.registry }}
        run: |
          set -euo pipefail
          [ -n "$IMAGE" ] || { echo "::error::push=true requires a non-empty 'image' input"; exit 1; }
          [ -n "$TAG" ]   || { echo "::error::push=true requires a non-empty 'tag' input"; exit 1; }
          # Prepend the registry secret only when it isn't already part of `image`
          # (lets callers pass either a full ref or repo-path + registry secret).
          if [ -n "$REGISTRY" ] && [ "${IMAGE#"$REGISTRY"/}" = "$IMAGE" ]; then
            ref="$REGISTRY/$IMAGE:$TAG"
          else
            ref="$IMAGE:$TAG"
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "image ref: $ref"

      - name: "Build + push (native single-arch)"
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platform }}
          push: ${{ inputs.push }}
          tags: ${{ steps.ref.outputs.ref }}
          build-args: ${{ inputs.build-args }}
          provenance: false   # clean single-arch digest (no attestation manifest)

      - name: "Report immutable digest"
        if: ${{ inputs.push }}
        env:
          REF: ${{ steps.ref.outputs.ref }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: echo "✓ pushed ${REF} (digest ${DIGEST})"
