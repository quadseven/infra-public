name: _reusable · issue-close completeness guard

# Reopens an issue closed as COMPLETED while it still has unchecked
# acceptance/test checkboxes — so issues can't be marked done with open items.
# Escape hatches: close as "not planned" (state_reason=not_planned), or add a
# `force-close`/`wontfix` label. Exempt sections (Out of scope / Blocked by /
# Reverse-if-wrong / Candidate / Further notes) are NOT counted.
#
# The checklist parser lives in .github/scripts/close-completeness/parse.js
# (infra-public#52/#53) — a pure, unit-tested `findUncheckedItems(body)`
# module. This step is a thin adapter: escape-hatch checks, require() the
# module, then the GitHub I/O (reopen + comment). See parse.test.js for the
# documented bug classes (2026-07-12, 2026-07-13 Qodo review, #47) this
# guard has already regressed on in production, plus #58 (a known,
# not-yet-fixed bug: consecutive unchecked bullets with no blank line
# between them only flag the last one — tracked separately, NOT fixed by
# the #52/#53 extraction, which is parity-preserving by design).

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner. Public repos: ubuntu-latest (default). Private repos: their ARC pool (GH-hosted is billable on private)."
        required: false
        type: string
        default: ubuntu-latest

permissions:
  issues: write

jobs:
  check-completeness:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    steps:
      # This is a REUSABLE workflow: when a caller in a different repo
      # invokes it via `uses: quadseven/infra-public/.github/workflows/
      # check.issue-close-completeness.yml@<ref>`, the job's DEFAULT
      # checkout context is the CALLER's repo, not infra-public - so
      # parse.js is not present unless explicitly fetched. `github.
      # workflow_sha` resolves to the CALLER's top-level workflow file SHA
      # (wrong repo entirely here - CodeRabbit caught this, verified
      # against GitHub's docs). `job.workflow_sha` is what resolves to the
      # SHA of the file that defines the CURRENT job - for a reusable
      # workflow's own job, that's this file itself, at exactly the ref
      # the caller pinned - checking that out guarantees the module
      # matches the exact version of this workflow that's currently
      # running, regardless of what repo/ref is calling it.
      - name: "Checkout infra-public (self) for the parser module"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: quadseven/infra-public
          ref: ${{ job.workflow_sha }}
          path: _close-completeness-guard-src
          persist-credentials: false
      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const path = require("path");
            const { findUncheckedItems } = require(
              path.join(process.env.GITHUB_WORKSPACE, "_close-completeness-guard-src",
                ".github", "scripts", "close-completeness", "parse.js")
            );

            const issue = context.payload.issue;
            if (issue.state_reason && issue.state_reason !== "completed") {
              core.info(`closed as ${issue.state_reason} — allowed`);
              return;
            }
            const labels = (issue.labels || []).map(l => (l.name || "").toLowerCase());
            if (labels.includes("force-close") || labels.includes("wontfix")) {
              core.info("force-close/wontfix label present — allowed");
              return;
            }

            const uncheckedItems = findUncheckedItems(issue.body || "");

            if (uncheckedItems.length === 0) {
              core.info("no open acceptance/test items — close stands");
              return;
            }

            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue.number, state: "open",
            });

            const formattedList = uncheckedItems.map(i => `- [ ] ${i}`).join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue.number,
              body: `🚧 **Reopened by the close-completeness guard** — closed as *completed* but still has ${uncheckedItems.length} unchecked item(s):\n\n${formattedList}\n\n` +
                `Finish + check them, or close it **as "not planned"** / add a \`force-close\` label. Exempt sections (Out of scope / Blocked by / Reverse-if-wrong / Candidate / Further notes) are not counted.`,
            });
            core.warning(`reopened #${issue.number} — ${uncheckedItems.length} unchecked item(s)`);
